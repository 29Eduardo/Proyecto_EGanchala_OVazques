{% extends "base.html" %}
{% block title %}Iniciar sesión · TaskHub{% endblock %}
{% block content %}
<div class="auth-card">
    <p class="eyebrow">Portal de entregas</p>
    <h1>Inicia sesión</h1>
    <p class="subtitle">Ingresa con tu correo institucional para ver tus tareas.</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" class="form">
        <label for="email">Correo</label>
        <input type="email" id="email" name="email" placeholder="nombre@xxxxxx.com" required autofocus>

        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>

        <button type="submit" class="btn-primary">Ingresar</button>
    </form>

    <p class="hint">¿No tienes cuenta? <a href="/register" class="link-muted">Regístrate aquí</a></p>
</div>
{% endblock %}
